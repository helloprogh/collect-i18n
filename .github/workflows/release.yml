name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.9.0
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.13.0
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify source
        run: |
          pnpm typecheck
          pnpm test
          pnpm build

      - name: Verify tag matches package version
        shell: bash
        run: |
          version=$(node -p "require('./package.json').version")
          expected="v${version}"
          test "$GITHUB_REF_NAME" = "$expected" || {
            echo "Tag $GITHUB_REF_NAME does not match package version $expected" >&2
            exit 1
          }

      - name: Package Skill
        run: pnpm package:skill

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" release/*.zip --verify-tag --generate-notes --title "Collect I18n $GITHUB_REF_NAME"
