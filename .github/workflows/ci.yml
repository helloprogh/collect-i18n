name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.9.0
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.13.0
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Verify 601-key benchmark
        run: pnpm test:benchmark

      - name: Build
        run: pnpm build

      - name: Validate and package Skill
        run: pnpm package:skill

      - name: Upload Skill package
        uses: actions/upload-artifact@v4
        with:
          name: collect-i18n-skill
          path: release/*.zip
          if-no-files-found: error
